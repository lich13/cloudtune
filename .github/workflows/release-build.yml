name: Build and release desktop packages

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      git_ref:
        description: Branch, commit, or tag to build
        required: false
        default: main
        type: string
      publish_release:
        description: Upload artifacts to a GitHub Release
        required: false
        default: false
        type: boolean
      release_tag:
        description: Existing tag to publish to when publish_release is enabled
        required: false
        type: string
      release_name:
        description: Optional release title
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-build-${{ github.event_name }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

env:
  BUILD_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || github.ref }}

jobs:
  build-windows:
    name: Build Windows x64 installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Windows x64 package
        run: npm run tauri:build:win:x64

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-installers
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
          if-no-files-found: error

  build-macos:
    name: Build macOS dmg
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build macOS ARM64 package
        run: npm run tauri:build:mac:arm64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/**/*.dmg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)

    steps:
      - name: Validate manual release inputs
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release
        shell: bash
        run: |
          if [[ -z "${{ inputs.release_tag }}" ]]; then
            echo "release_tag is required when publish_release=true" >&2
            exit 1
          fi

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-installers
          path: release-assets

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: release-assets

      - name: Compute release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="${{ inputs.release_tag }}"
          fi
          name="${{ inputs.release_name }}"
          if [[ -z "${name}" ]]; then
            name="${tag}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "name=${name}" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          files: |
            release-assets/*.exe
            release-assets/*.msi
            release-assets/*.dmg
          generate_release_notes: true
