name: Build and release desktop packages

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      git_ref:
        description: Branch, commit, or tag to build
        required: false
        default: main
        type: string
      publish_release:
        description: Upload artifacts to a GitHub Release
        required: false
        default: false
        type: boolean
      release_tag:
        description: Existing tag to publish to when publish_release is enabled
        required: false
        type: string
      release_name:
        description: Optional release title
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-build-${{ github.event_name }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

env:
  BUILD_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || github.ref }}

jobs:
  build-windows:
    name: Build Windows x64 installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Windows x64 package
        run: npm run tauri:build:win:x64

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-x64-installers
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
          if-no-files-found: error

  build-macos:
    name: Build macOS dmg
    runs-on: macos-latest
    env:
      APPLE_SIGNING_IDENTITY: "-"
      MACOS_DEV_SIGNING_READY: "false"
      MACOS_NOTARIZATION_READY: "false"
      APPLE_API_KEY_PATH: ${{ github.workspace }}/AuthKey.p8

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Prepare Apple Developer signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE" || -z "$APPLE_CERTIFICATE_PASSWORD" || -z "$KEYCHAIN_PASSWORD" ]]; then
            echo "Apple Developer certificate secrets not set. Falling back to ad-hoc signing."
            exit 0
          fi

          if ! python3 -c 'import base64, os, pathlib; pathlib.Path("certificate.p12").write_bytes(base64.b64decode(os.environ["APPLE_CERTIFICATE"].strip(), validate=True))'
          then
            echo "APPLE_CERTIFICATE is not a valid base64-encoded p12 payload. Falling back to ad-hoc signing."
            exit 0
          fi

          if ! openssl pkcs12 -in certificate.p12 -passin pass:"$APPLE_CERTIFICATE_PASSWORD" -nokeys >/dev/null 2>&1; then
            echo "APPLE_CERTIFICATE or APPLE_CERTIFICATE_PASSWORD is invalid. Falling back to ad-hoc signing."
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -E 'Developer ID Application|Apple Development|Apple Distribution' | head -n 1 | awk -F'"' '{print $2}')
          if [[ -z "$CERT_ID" ]]; then
            echo "No valid Apple signing identity found after certificate import. Falling back to ad-hoc signing."
            exit 0
          fi

          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "MACOS_DEV_SIGNING_READY=true" >> "$GITHUB_ENV"

          if [[ -n "$APPLE_ID" && -n "$APPLE_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
            echo "MACOS_NOTARIZATION_READY=true" >> "$GITHUB_ENV"
          fi

          if [[ -n "$APPLE_API_KEY" && -n "$APPLE_API_ISSUER" ]]; then
            printf '%s' "$APPLE_API_KEY" > "$APPLE_API_KEY_PATH"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"
            echo "MACOS_NOTARIZATION_READY=true" >> "$GITHUB_ENV"
          fi

      - name: Build macOS ARM64 package
        run: npm run tauri:build:mac:arm64

      - name: Verify macOS dmg size
        shell: bash
        run: |
          DMG_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' | head -n 1)
          if [[ -z "$DMG_PATH" ]]; then
            echo "No dmg found" >&2
            exit 1
          fi
          ls -lh "$DMG_PATH"
          DMG_SIZE_BYTES=$(stat -f%z "$DMG_PATH")
          echo "macOS dmg size: $DMG_SIZE_BYTES bytes"
          if (( DMG_SIZE_BYTES > 512 * 1024 * 1024 )); then
            echo "macOS dmg is unexpectedly large" >&2
            exit 1
          fi

      - name: Verify macOS app bundle signature integrity
        shell: bash
        run: |
          APP_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' | head -n 1)
          if [[ -z "$APP_PATH" ]]; then
            echo "No app bundle found" >&2
            exit 1
          fi
          test -f "$APP_PATH/Contents/_CodeSignature/CodeResources"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Verify Gatekeeper acceptance for notarized builds
        if: ${{ env.MACOS_DEV_SIGNING_READY == 'true' && env.MACOS_NOTARIZATION_READY == 'true' }}
        shell: bash
        run: |
          APP_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' | head -n 1)
          spctl -a -vv "$APP_PATH"

      - name: Warn when publishing ad-hoc macOS package
        if: ${{ env.MACOS_NOTARIZATION_READY != 'true' }}
        shell: bash
        run: |
          echo "macOS package will be published with ad-hoc signing only."
          echo "Downloaded builds will require manual Gatekeeper bypass on end-user machines."

      - name: Package macOS artifact archive
        shell: bash
        run: |
          DMG_PATH=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' | head -n 1)
          if [[ -z "$DMG_PATH" ]]; then
            echo "No dmg found to archive" >&2
            exit 1
          fi
          mkdir -p release-artifacts
          ARCHIVE_PATH="release-artifacts/$(basename "$DMG_PATH").zip"
          ditto -c -k --sequesterRsrc "$DMG_PATH" "$ARCHIVE_PATH"
          ls -lh "$ARCHIVE_PATH"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-dmg
          path: |
            release-artifacts/*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate manual release inputs
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release
        shell: bash
        run: |
          if [[ -z "${{ inputs.release_tag }}" ]]; then
            echo "release_tag is required when publish_release=true" >&2
            exit 1
          fi

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-x64-installers
          path: release-assets

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-dmg
          path: release-assets

      - name: Unpack macOS dmg archive
        shell: bash
        run: |
          shopt -s nullglob
          archives=(release-assets/*.zip)
          if (( ${#archives[@]} == 0 )); then
            echo "No macOS archive found" >&2
            exit 1
          fi
          for archive in "${archives[@]}"; do
            unzip -o "$archive" -d release-assets
            rm -f "$archive"
          done

      - name: Compute release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="${{ inputs.release_tag }}"
          fi
          name="${{ inputs.release_name }}"
          if [[ -z "${name}" ]]; then
            name="${tag}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "name=${name}" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.name }}
        run: |
          shopt -s nullglob
          files=(release-assets/*.exe release-assets/*.msi release-assets/*.dmg)
          if (( ${#files[@]} == 0 )); then
            echo "No release assets found" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_NAME"
          else
            gh release create "$RELEASE_TAG" "${files[@]}" --title "$RELEASE_NAME" --generate-notes
          fi
